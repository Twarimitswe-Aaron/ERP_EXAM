spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: payroll
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/payroll_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always # To run schema.sql for the trigger setup
      separator: "^"

app:
  admin:
    email: ${SUPER_ADMIN_EMAIL:admin@gov.rw}
    password: ${SUPER_ADMIN_PASSWORD:Admin@123}

jwt:
  secret: ${JWT_SECRET:aV2dCqA8xK7yN3hL5wP8bE2mT9uR4fG6jH1kL3oM5nP7qS9vW2xZ4cE6gI8jK0}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:*}
  endpoint:
    health:
      show-details: always
